<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="приглашение на свадьбу симы и жени — 08.08.2026" />
    <meta name="theme-color" content="#000000" />
    <title>сима и женя — 08.08.2026</title>
  </head>
  <body>
    <!-- Splash screen: styled as an mp3 file in a player. Any tap starts the
         music and fades into the main page. -->
    <div
      class="splash"
      id="splash"
      role="button"
      tabindex="0"
      aria-label="нажмите на mp3, чтобы открыть приглашение"
    >
      <p class="splash__hint">нажмите на mp3, чтобы<br />открыть приглашение</p>
      <div class="splash__card">
        <div class="splash__photo">
          <img src="/src/assets/images/couple_kiss.webp" alt="Сима и Женя" />
          <img
            class="splash__pattern"
            src="/src/assets/images/orange_heart_pattern.webp"
            alt=""
          />
        </div>
      </div>
      <p class="splash__label">2026_свадьба<br />симы и жени.mp3</p>
    </div>

    <!-- Fixed mute/unmute button, appears once the invitation is opened -->
    <button
      class="mute-btn"
      id="mute-btn"
      type="button"
      aria-pressed="false"
      aria-label="выключить музыку"
      hidden
    >
      <img src="/src/assets/images/music_on_icon.webp" alt="" />
    </button>

    <!-- Floating back-to-top button, appears after the first screen -->
    <button
      class="to-top"
      id="to-top"
      type="button"
      aria-label="наверх, к содержанию"
      data-scroll-to="#contents"
      hidden
    >
      <span aria-hidden="true">v</span>
    </button>

    <main id="page">
      <!-- Section 1: title — reference: slide1.png -->
      <section class="section section--title" id="title">
        <div class="col s1">
          <div class="s1__dot" data-reveal></div>
          <h1 class="s1__headline">
            <span class="s1__line s1__line--1" data-reveal>все</span>
            <span class="s1__line s1__line--2" data-reveal>начинается</span>
            <span class="s1__line s1__line--3" data-reveal>с точки</span>
          </h1>
          <img
            class="s1__photo s1__photo--1"
            src="/src/assets/images/couple_image1.webp"
            alt="Сима и Женя"
            data-reveal
          />
          <p class="s1__names">
            <span class="s1__name s1__name--sima" data-reveal>сима</span>
            <span class="s1__name s1__name--i" data-reveal>и</span>
            <span class="s1__name s1__name--zhenya" data-reveal>женя</span>
          </p>
          <div class="s1__circle" data-reveal></div>
          <img
            class="s1__photo s1__photo--2"
            src="/src/assets/images/couple_image2.webp"
            alt="Сима и Женя на диване"
            data-reveal
          />
          <img
            class="s1__photo s1__photo--3"
            src="/src/assets/images/couple_image3.webp"
            alt="Сима и Женя на крыше"
            data-reveal
          />
          <p class="s1__date">
            <span class="s1__date-day" data-reveal>08.08.</span>
            <span class="s1__date-year" data-reveal>2026</span>
          </p>
          <img
            class="s1__photo s1__photo--4"
            src="/src/assets/images/couple_image4.webp"
            alt="Сима и Женя в масках для лица"
            data-reveal
          />
          <button
            class="s1__scroll"
            type="button"
            aria-label="перейти к содержанию"
            data-scroll-to="#contents"
          >
            <span aria-hidden="true">v</span>
          </button>
        </div>
      </section>

      <!-- Section 2: table of contents — reference: slide2.png -->
      <section class="section section--contents" id="contents">
        <div class="col s2">
          <h2 class="s2__heading">
            <span class="s2__heading-part s2__heading-part--1" data-reveal>содерж</span>
            <span class="s2__heading-part s2__heading-part--2" data-reveal>ание</span>
            <span class="s2__heading-dot" data-reveal></span>
          </h2>
          <a class="s2__item s2__item--1" href="#timing" data-scroll-to="#timing" data-reveal>
            <img src="/src/assets/images/folder_icon1.webp" alt="" />
            <span class="s2__label">тайминг</span>
          </a>
          <a class="s2__item s2__item--2" href="#location" data-scroll-to="#location" data-reveal>
            <img src="/src/assets/images/folder_icon2.webp" alt="" />
            <span class="s2__label">локация</span>
          </a>
          <a class="s2__item s2__item--3" href="#details" data-scroll-to="#details" data-reveal>
            <img src="/src/assets/images/folder_icon3.webp" alt="" />
            <span class="s2__label">детали</span>
          </a>
          <a class="s2__item s2__item--4" href="#dresscode" data-scroll-to="#dresscode" data-reveal>
            <img src="/src/assets/images/folder_icon4.webp" alt="" />
            <span class="s2__label">dress-code</span>
          </a>
          <a class="s2__item s2__item--5" href="#brief" data-scroll-to="#brief" data-reveal>
            <img src="/src/assets/images/folder_icon5.webp" alt="" />
            <span class="s2__label">бриф<br />гостя</span>
          </a>
        </div>
      </section>

      <!-- Section 3: timeline -->
      <section class="section section--timing" id="timing">
        <div class="col">
          <p class="placeholder">тайминг</p>
        </div>
      </section>

      <!-- Section 4: location -->
      <section class="section section--location" id="location">
        <div class="col">
          <p class="placeholder">локация</p>
        </div>
      </section>

      <!-- Section 5: details -->
      <section class="section section--details" id="details">
        <div class="col">
          <p class="placeholder">детали торжества</p>
        </div>
      </section>

      <!-- Section 6: dress code -->
      <section class="section section--dresscode" id="dresscode">
        <div class="col">
          <p class="placeholder">dress-code</p>
        </div>
      </section>

      <!-- Section 7: guest brief / RSVP -->
      <section class="section section--brief" id="brief">
        <div class="col">
          <p class="placeholder">бриф гостя</p>
        </div>
      </section>

      <!-- Section 8: closing -->
      <section class="section section--closing" id="closing">
        <div class="col">
          <p class="placeholder">с любовью, Сима и Женя!</p>
        </div>
      </section>
    </main>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
